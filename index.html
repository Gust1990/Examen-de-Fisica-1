<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Avanzado Física I - UNT</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">

    <style>
        /* PANTALLA DE CARGA (SPLASH SCREEN) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .splash-icon { font-size: 100px; }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; color: #333; line-height: 1.6; padding: 20px; text-align: center; margin: 0; }
        .container { max-width: 850px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 6px solid #0056b3; min-height: 400px; display: none; }
        h1 { color: #0056b3; border-bottom: 2px solid #e9ecef; padding-bottom: 15px; }
        .pantalla { display: none; }
        .activa { display: block; }
        
        .grid-unidades { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; margin-top: 20px;}
        .btn-unidad { background: #6c757d; color: white; padding: 15px; font-size: 1.1em; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; font-weight: bold;}
        .btn-unidad:hover { background: #5a6268; transform: translateY(-2px); }
        .btn-unidad.destacado { background: #0056b3; }
        .btn-unidad.destacado:hover { background: #004494; }
        
        .reloj { font-size: 2em; font-weight: bold; color: #d9534f; margin: 20px 0; background: #fdf2f2; padding: 10px; border-radius: 8px; border: 2px solid #d9534f; display: inline-block; }
        .pregunta-texto { font-size: 1.0em; font-weight: bold; color: #004085; margin-bottom: 30px; }
        .respuesta-texto { font-size: 0.9em; background: #f8f9fa; padding: 20px; border-left: 5px solid #28a745; border-radius: 6px; margin-bottom: 30px; display: none; text-align: left; }
        
        .btn { border: none; padding: 12px 25px; font-size: 1.1em; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-revelar { background: #17a2b8; color: white; }
        .btn-correcto { background: #28a745; color: white; display: none; }
        .btn-incorrecto { background: #dc3545; color: white; display: none; }
        .btn-volver { background: #6c757d; color: white; margin-top: 20px; }
        
        .historial-caja { margin-top: 40px; text-align: left; background: #f8f9fa; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #dee2e6; text-align: center; }
        th { background: #0056b3; color: white; }
        .progreso { font-size: 1.2em; color: #6c757d; margin-bottom: 5px; font-weight: bold; }
        .unidad-titulo { font-size: 1em; color: #17a2b8; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* BARRA DE PROGRESO */
        .barra-progreso-contenedor { width: 100%; background-color: #e9ecef; border-radius: 10px; height: 12px; margin-bottom: 20px; overflow: hidden; }
        .barra-progreso-relleno { height: 100%; background-color: #28a745; width: 0%; transition: width 0.4s ease; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-icon">🧭</div>
    </div>

    <div class="container" id="main-content">
        <h1>Examen de Física 1</h1>
        <div id="pantalla-inicio" class="pantalla activa">
            <p>Selecciona la unidad que deseas evaluar. Tienes exactamente <strong>60 segundos</strong> para responder por pregunta</p>
            <div class="grid-unidades">
                <button class="btn-unidad" onclick="iniciarTest(1)">📘 Unidad 1</button>
                <button class="btn-unidad" onclick="iniciarTest(2)">📗 Unidad 2</button>
                <button class="btn-unidad" onclick="iniciarTest(3)">📙 Unidad 3</button>
                <button class="btn-unidad" onclick="iniciarTest(4)">📕 Unidad 4</button>
                <button class="btn-unidad" onclick="iniciarTest(5)">📓 Unidad 5</button>
                <button class="btn-unidad destacado" onclick="iniciarTest(6)">📔 Unidad 6</button>
            </div>
            <div class="historial-caja">
                <h3>📊 Historial</h3>
                <select id="filtro-historial" onchange="mostrarHistorial()" style="padding: 5px; margin-bottom: 10px; border-radius: 4px;">
                    <option value="1">Unidad 1</option>
                    <option value="2">Unidad 2</option>
                    <option value="3">Unidad 3</option>
                    <option value="4">Unidad 4</option>
                    <option value="5">Unidad 5</option>
                    <option value="6">Unidad 6</option>
                </select>
                <table>
                    <thead><tr><th>Fecha</th><th>Puntaje</th><th>Porcentaje</th></tr></thead>
                    <tbody id="tabla-historial"></tbody>
                </table>
            </div>
        </div>

        <div id="pantalla-juego" class="pantalla">
            <div class="unidad-titulo" id="texto-unidad-actual">Unidad X</div>
            <div class="progreso" id="texto-progreso">Pregunta 1 de X</div>
            
            <div class="barra-progreso-contenedor">
                <div id="barra-progreso" class="barra-progreso-relleno"></div>
            </div>

            <div class="reloj" id="tiempo-restante">⏳ 60s</div>
            <div class="pregunta-texto" id="texto-pregunta">Cargando...</div>
            <div class="respuesta-texto" id="texto-respuesta">Cargando...</div>
            <div>
                <button class="btn-revelar btn" id="btn-revelar" onclick="revelarRespuesta()">👀 Ver Respuesta</button>
                <button class="btn-correcto btn" id="btn-correcto" onclick="siguientePregunta(true)">✅ Correcto</button>
                <button class="btn-incorrecto btn" id="btn-incorrecto" onclick="siguientePregunta(false)">❌ Incorrecto</button>
            </div>
            <button class="btn-volver btn" onclick="volverAlInicio()">⏹️ Abandonar el Examen</button>
        </div>

        <div id="pantalla-resultados" class="pantalla">
            <h2 id="mensaje-final">¡Test Terminado!</h2>
            <p style="font-size: 1.5em;" id="texto-nota"></p>
            <button class="btn-unidad destacado btn" style="margin-top: 20px;" onclick="volverAlInicio()">🏠 Volver al Menú</button>
        </div>
    </div>

    <script>
        // BASE DE DATOS (Incluye las 70 preguntas procesadas)
        const basesDeDatos = {
            1: [
                { q: "1.- Verdadero o Falso (justifique claramente): 'La notación científica solo se usa para mediciones que arrojen números o muy grandes o muy pequeños'.", a: "Falso. La notación científica también se usa para expresar cualquier número de forma estandarizada y para indicar correctamente el número de cifras significativas." },
                { q: "2.- (P) Conteste (justifique claramente): ¿Puede el valor numérico obtenido al calcular una cantidad física a partir de datos de mediciones tener mayor número de cifras significativas que el menos preciso de los datos usados?", a: "No. El resultado final no puede tener más cifras significativas que el factor original que tenga la menor cantidad de cifras significativas (el menos preciso)." },
                { q: "3.- Verdadero o Falso (justifique claramente): 'La homogeneidad dimensional es una condición suficiente para asegurar que la ecuación matemática de un modelo físico es correcta.'", a: "Falso. Es una condición necesaria, pero no suficiente. Una ecuación puede ser dimensionalmente correcta pero faltarle constantes numéricas adimensionales." },
                { q: "4.- (P) Verdadero o Falso (justifique claramente): 'Para poder comunicar magnitudes vectoriales es imprescindible conocer el sistema de coordenadas elegido'.", a: "Falso. El vector es un ente independiente del sistema de referencia. Lo que depende del sistema son las 'componentes' del vector, pero el vector en sí no." },
                { q: "5.- Conteste (justifique claramente): ¿Cuáles pueden ser las ventajas de que la humanidad acuerde un sistema de unidades patrones común como lo es el SI?", a: "Facilita el intercambio de información científica, evita errores de conversión y permite que los experimentos sean replicables en cualquier parte del mundo." }
            ],
            2: [
                { q: "1.- ¿Cómo se define matemáticamente el desplazamiento? ¿Es lo mismo que distancia recorrida?", a: "El desplazamiento es el vector que une la posición inicial con la final. No son iguales: el desplazamiento es vectorial y la distancia recorrida es un escalar que mide todo el camino." },
                { q: "2.- ¿Es lo mismo velocidad que rapidez?", a: "No. La velocidad es vectorial (módulo, dirección y sentido). La rapidez es un escalar que representa solo el módulo de la velocidad." },
                { q: "3.- ¿El módulo del desplazamiento es siempre igual a la distancia recorrida en movimiento rectilíneo?", a: "Falso. Solo es igual si el movimiento rectilíneo no tiene cambios de sentido durante el trayecto." },
                { q: "4.- Si la velocidad media es cero, ¿la partícula permaneció en reposo todo el tiempo?", a: "Falso. La velocidad media es cero si el desplazamiento neto es cero (volvió al punto de partida), aunque se haya movido." },
                { q: "5.- ¿Aceleración positiva significa que la rapidez aumenta?", a: "Falso. Si la velocidad es negativa y la aceleración positiva, el cuerpo está frenando." },
                { q: "6.- ¿Cómo se determina la aceleración media?", a: "Es el cociente entre el cambio del vector velocidad (Δv) y el intervalo de tiempo (Δt). Es una magnitud vectorial medida en m/s²." },
                { q: "10.- Si mantiene aceleración constante, ¿la trayectoria es siempre recta?", a: "No necesariamente. Si la aceleración constante no es paralela a la velocidad inicial, la trayectoria es una parábola (como el tiro oblicuo)." }
            ],
            3: [
                { q: "1.- Relación entre velocidad y trayectoria.", a: "La dirección del vector velocidad instantánea siempre es tangente a la trayectoria en todo punto." },
                { q: "6.- ¿Qué características debe tener un movimiento para definir un periodo T?", a: "Debe ser un Movimiento Circular Uniforme (MCU). La rapidez y la velocidad angular deben ser constantes." },
                { q: "12.- ¿ω y γ están en el mismo plano que el movimiento?", a: "Falso. Son vectores axiales, se encuentran sobre el eje de rotación (perpendicular al plano del movimiento)." }
            ],
            4: [
                { q: "1.- ¿La cantidad de movimiento lineal p depende del sistema de coordenadas?", a: "Sí. Como p = m·v y la velocidad depende del sistema de referencia, la cantidad de movimiento también es relativa al observador." },
                { q: "8.- ¿Ec = ½ mv² es definición o teorema?", a: "Es una definición. El teorema es el del Trabajo y la Energía Cinética (W_neto = ΔEc)." },
                { q: "11.- ¿Puede ser negativa la energía potencial gravitatoria?", a: "Sí, porque depende del nivel de referencia (h=0) elegido arbitrariamente. Si está por debajo de ese nivel, es negativa." }
            ],
            5: [
                { q: "1.- ¿La velocidad del CM puede ser cero si todas las partículas se mueven?", a: "Sí. Si la suma vectorial de todas las cantidades de movimiento es nula (Σ pi = 0), el centro de masa está en reposo." },
                { q: "6.- ¿En qué tipo de choque hay máxima pérdida de energía cinética?", a: "En el choque perfectamente inelástico, donde los cuerpos quedan unidos tras la colisión." }
            ],
            6: [
                { q: "1.- Definición de Cuerpo Rígido.", a: "Sistema de partículas donde la distancia entre cada par de puntos permanece constante (no hay deformación)." },
                { q: "3.- ¿Todas las partes de un rígido tienen igual ω y γ?", a: "Verdadero. Al no deformarse, todas las partes barren el mismo ángulo en el mismo tiempo." }
            ]
        };

        let unidadActual = 1;
        let preguntasMezcladas = [];
        let indiceActual = 0;
        let puntaje = 0;
        let tiempoRestante = 60;
        let temporizador = null;
        
        window.addEventListener('load', function() {
            mostrarHistorial();
            setTimeout(function() {
                const splash = document.getElementById('splash-screen');
                const content = document.getElementById('main-content');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    content.style.display = 'block';
                }, 500);
            }, 1500);
        });

        function iniciarTest(unidadSeleccionada) {
            unidadActual = unidadSeleccionada;
            let bancoSeleccionado = basesDeDatos[unidadActual];
            if (!bancoSeleccionado || bancoSeleccionado.length === 0) {
                alert("Unidad vacía temporalmente.");
                return;
            }
            preguntasMezcladas = [...bancoSeleccionado].sort(() => Math.random() - 0.5);
            indiceActual = 0;
            puntaje = 0;
            document.getElementById('pantalla-inicio').classList.remove('activa');
            document.getElementById('pantalla-juego').classList.add('activa');
            document.getElementById('texto-unidad-actual').innerText = `UNIDAD ${unidadActual}`;
            cargarPregunta();
        }

        function cargarPregunta() {
            if (indiceActual >= preguntasMezcladas.length) {
                finalizarTest();
                return;
            }
            document.getElementById('texto-progreso').innerText = `Pregunta ${indiceActual + 1} de ${preguntasMezcladas.length}`;
            
            let porcentajeProgreso = (indiceActual / preguntasMezcladas.length) * 100;
            document.getElementById('barra-progreso').style.width = porcentajeProgreso + '%';

            document.getElementById('texto-pregunta').innerHTML = preguntasMezcladas[indiceActual].q;
            document.getElementById('texto-respuesta').innerHTML = preguntasMezcladas[indiceActual].a;
            document.getElementById('texto-respuesta').style.display = 'none';
            document.getElementById('btn-revelar').style.display = 'inline-block';
            document.getElementById('btn-correcto').style.display = 'none';
            document.getElementById('btn-incorrecto').style.display = 'none';
            
            tiempoRestante = 60;
            document.getElementById('tiempo-restante').innerText = `⏳ ${tiempoRestante}s`;
            clearInterval(temporizador);
            temporizador = setInterval(actualizarReloj, 1000);
        }

        /* --- MEJORA: LÓGICA DE TIEMPO AGOTADO --- */
        function actualizarReloj() {
            tiempoRestante--;
            document.getElementById('tiempo-restante').innerText = `⏳ ${tiempoRestante}s`;
            if (tiempoRestante <= 0) {
                clearInterval(temporizador);
                alert("⏰ ¡Se te acabó el tiempo!"); // El cartel que pediste
                siguientePregunta(false); // Se marca como Incorrecto automáticamente
            }
        }

        function revelarRespuesta() {
            clearInterval(temporizador);
            document.getElementById('texto-respuesta').style.display = 'block';
            document.getElementById('btn-revelar').style.display = 'none';
            document.getElementById('btn-correcto').style.display = 'inline-block';
            document.getElementById('btn-incorrecto').style.display = 'inline-block';

            if (indiceActual === preguntasMezcladas.length - 1) {
                document.getElementById('barra-progreso').style.width = '100%';
            }
        }

        function siguientePregunta(esCorrecta) {
            if (esCorrecta) puntaje++;
            indiceActual++;
            cargarPregunta();
        }

        function finalizarTest() {
            clearInterval(temporizador);
            document.getElementById('pantalla-juego').classList.remove('activa');
            document.getElementById('pantalla-resultados').classList.add('activa');
            let total = preguntasMezcladas.length;
            let porcentaje = Math.round((puntaje / total) * 100);
            document.getElementById('texto-nota').innerText = `Acertaste ${puntaje} de ${total} (${porcentaje}%)`;
            guardarEnHistorial(puntaje, total, porcentaje);
        }

        function guardarEnHistorial(puntos, total, porc) {
            let key = `historial_UNT_U${unidadActual}`;
            let historial = JSON.parse(localStorage.getItem(key)) || [];
            historial.push({ fecha: new Date().toLocaleString(), puntaje: puntos + "/" + total, porcentaje: porc });
            localStorage.setItem(key, JSON.stringify(historial));
            mostrarHistorial();
        }

        function mostrarHistorial() {
            let unidadFiltro = document.getElementById('filtro-historial').value;
            let key = `historial_UNT_U${unidadFiltro}`;
            let historial = JSON.parse(localStorage.getItem(key)) || [];
            let tabla = document.getElementById('tabla-historial');
            tabla.innerHTML = "";
            if (historial.length === 0) {
                tabla.innerHTML = "<tr><td colspan='3'>Sin datos</td></tr>";
                return;
            }
            historial.slice().reverse().forEach(registro => {
                tabla.innerHTML += `<tr><td>${registro.fecha}</td><td>${registro.puntaje}</td><td>${registro.porcentaje}%</td></tr>`;
            });
        }

        function volverAlInicio() {
            clearInterval(temporizador);
            document.getElementById('pantalla-juego').classList.remove('activa');
            document.getElementById('pantalla-resultados').classList.remove('activa');
            document.getElementById('pantalla-inicio').classList.add('activa');
        }
    </script>
</body>
</html>
